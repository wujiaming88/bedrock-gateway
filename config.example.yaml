# Bedrock Gateway example configuration
# Copy to config.yaml and customize.

# ─── Authentication ───────────────────────────────────────
# Supported modes: bearer_token | credentials | iam_role | profile
auth:
  mode: bearer_token
  bearer_token: ${AWS_BEARER_TOKEN_BEDROCK}

  # -- credentials mode --
  # mode: credentials
  # access_key_id: ${AWS_ACCESS_KEY_ID}
  # secret_access_key: ${AWS_SECRET_ACCESS_KEY}
  # session_token: ${AWS_SESSION_TOKEN}  # optional

  # -- iam_role mode (auto from EC2/ECS/Lambda) --
  # mode: iam_role

  # -- profile mode (AWS CLI profile) --
  # mode: profile
  # profile: default

# ─── Region ───────────────────────────────────────────────
region: us-east-1

# ─── Server ───────────────────────────────────────────────
server:
  host: 127.0.0.1
  port: 4000
  log_level: info   # debug | info | warning | error
  # api_key: ${BEDROCK_API_KEY}  # uncomment to require authentication

# ─── Retry ────────────────────────────────────────────────
retry:
  max_retries: 3
  base_delay: 1.0   # seconds, exponential backoff: delay * 2^attempt

# ─── Dashboard ────────────────────────────────────────────
# Observability UI at /dashboard/ and the /api/metrics/* JSON API.
# When server.api_key is set the dashboard requires it (cookie, Bearer,
# x-api-key, or ?key=). When it is not set the dashboard restricts itself
# to localhost unless `localhost_only: false` is set explicitly.
dashboard:
  enabled: true            # expose the dashboard at all?
  require_auth: true       # require API key when one is configured
  # localhost_only: false  # set true/false to override the default
  rate_limit: 60           # /api/metrics/* requests/minute/IP
  max_request_log: 200     # rows retained in the request-log panel

# ─── Models ───────────────────────────────────────────────
# Map user-facing aliases to Bedrock model IDs.
# Omit this section entirely to use the built-in defaults.
models:
  claude-opus-4.7:
    bedrock_id: us.anthropic.claude-opus-4-7
    context_length: 1000000
    max_output: 128000

  claude-opus-4:
    bedrock_id: us.anthropic.claude-opus-4-6-v1
    context_length: 1000000
    max_output: 128000

  claude-sonnet-4.6:
    bedrock_id: us.anthropic.claude-sonnet-4-6
    context_length: 1000000
    max_output: 64000

  claude-sonnet-4:
    bedrock_id: us.anthropic.claude-sonnet-4-20250514-v1:0
    context_length: 200000
    max_output: 64000

  claude-haiku:
    bedrock_id: us.anthropic.claude-haiku-4-5-20251001-v1:0
    context_length: 200000
    max_output: 64000

  claude-sonnet-3.5:
    bedrock_id: us.anthropic.claude-3-5-sonnet-20241022-v2:0
    context_length: 200000
    max_output: 64000
